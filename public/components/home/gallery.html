<div id="galleryWrapper" class="px-3 pt-3 pb-1" style="display:none;" oncontextmenu="return false;">

        <span class="material-icons-round text-primary me-1" style="font-size: 16px; vertical-align: text-bottom;">trending_up</span>
        Rd Algo Software Performance
    </h6>

    <div id="galleryCarousel" class="carousel slide gallery-carousel" data-bs-ride="carousel" data-bs-interval="3000">
