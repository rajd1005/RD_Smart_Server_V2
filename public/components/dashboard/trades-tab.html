<div id="tradeSection">
    <div class="stats-bar align-items-center">
        <div class="stat-item" id="statPoints" style="display:none;"><span class="stat-lbl">Points</span><span class="stat-val" id="totalPips">0.00</span></div>
        <div class="stat-item"><span class="stat-lbl">Active</span><span class="stat-val" id="activeTrades">0</span></div>
        <div class="stat-item" id="statWinRate" style="display:none;"><span class="stat-lbl">Win Rate</span><span class="stat-val" id="winRate">0%</span></div>
        <div class="stat-item"><span class="stat-lbl">Signals</span><span class="stat-val" id="totalTrades">0</span></div>
        
        <div class="stat-item ms-auto">
            <span class="stat-lbl">Market</span>
            <select id="filterCategory" class="form-select border-1" style="padding: 2px 18px 2px 6px; font-size: 11px; height: 24px; box-shadow: none;" onchange="applyFilters()">
                <option value="ALL">All</option>
                <option value="Forex/Crypto">Forex/Crypto</option>
                <option value="Stock">Stock</option>
                <option value="Index">Index</option>
                <option value="Mcx">Mcx</option>
            </select>
        </div>
    </div>
    <div class="trade-list" id="tradeListContainer"></div>
    <div id="noData" style="display:none;"><span class="material-icons-round" style="font-size:32px; opacity:0.3;">toc</span><div class="mt-2 text-muted small">No trades found</div></div>
</div>

<div class="offcanvas offcanvas-bottom" tabindex="-1" id="filterSheet">
    <div class="offcanvas-header pb-0"><h6 class="offcanvas-title fw-bold">Filter Options</h6><button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body pt-2">
    <div class="row g-2">
            <div class="col-12">
                <label class="form-label fw-bold mb-1" style="font-size: 9px; color: var(--text-secondary); text-transform: uppercase;">Date / Range</label>
                <input type="text" id="filterDateRange" class="form-control" placeholder="Select Date(s)..." style="background-color: #fff;">
            </div>
            <div class="col-6">
                <label class="form-label fw-bold mb-1" style="font-size: 9px; color: var(--text-secondary); text-transform: uppercase;">Type</label>
                <select id="filterType" class="form-select"><option value="ALL">All</option><option value="BUY">Buy</option><option value="SELL">Sell</option></select>
            </div>
            <div class="col-6">
                <label class="form-label fw-bold mb-1" style="font-size: 9px; color: var(--text-secondary); text-transform: uppercase;">Status</label>
                <select id="filterStatus" class="form-select"><option value="ALL">All</option><option value="OPEN">Running</option><option value="TP">Profitable</option><option value="SL">Loss</option></select>
            </div>
            <div class="col-12">
                <label class="form-label fw-bold mb-1" style="font-size: 9px; color: var(--text-secondary); text-transform: uppercase;">Symbol</label>
                <select id="filterSymbol" class="form-select"><option value="">All Symbols</option></select>
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-3 fw-bold" style="padding:8px; border-radius:4px;" data-bs-dismiss="offcanvas" onclick="applyFilters()">Apply</button>
    </div>
</div>
