<header class="app-header">
    <div class="d-flex align-items-center">
        <div class="app-title">Rd Algo</div>
        <div id="activeDateDisplay" style="font-size: 10px; background: #e3f2fd; color: var(--blue); padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 600;">Loading...</div>
    </div>
    <div class="d-flex align-items-center">
        <div class="server-time" id="clock" style="margin-right: 15px;">00:00:00</div>
        
        <button id="installAppBtn" onclick="installPWA()" style="display:none; background:#00b346; color:#fff; border:none; border-radius:4px; padding:4px 8px; font-size:11px; font-weight:bold; margin-right: 15px;">
            <span class="material-icons-round" style="font-size:14px; vertical-align:middle;">download</span> Install
        </button>
        <button id="btnAdminCourseManager" class="position-relative" type="button" data-bs-toggle="modal" data-bs-target="#adminCourseModal" style="display:none; background:none; border:none; color:var(--blue); padding:0; align-items:center; margin-right: 15px;">
            <span class="material-icons-round">settings</span>
        </button>
        
        <button class="position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#notificationSheet" style="background:none; border:none; color:var(--text-primary); padding:0; display:flex; align-items:center; margin-right: 15px;">
            <span class="material-icons-round">notifications</span>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" id="notifBadge" style="display:none;"><span class="visually-hidden">New alerts</span></span>
        </button>

        <button onclick="logout()" style="background:none; border:none; color:var(--red); padding:0; display:flex; align-items:center;">
            <span class="material-icons-round">logout</span>
        </button>
    </div>
</header>

<div class="offcanvas offcanvas-end" tabindex="-1" id="notificationSheet" style="width: 320px; max-width: 100vw;">
    <div class="offcanvas-header pb-0 border-bottom">
        <h6 class="offcanvas-title fw-bold"><span class="material-icons-round text-primary me-2 align-middle">notifications_active</span>Alerts</h6>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body pt-2" id="userNotificationList" style="background-color: #efeae2; overflow-y: auto;">
        <div class="text-center text-muted mt-3" style="font-size:12px;">Loading alerts...</div>
    </div>
</div>
