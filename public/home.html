<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RD Algo - Trading Masterclass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/home.css"> </head>
<body>
    <div class="app-wrapper">
        <div id="comp-navbar"></div>
        <div id="comp-gallery"></div>
        <div id="comp-call-report"></div>
        <div id="comp-courses"></div>
        
        <div class="footer">&copy; 2026 RD Algo Trading.<br>All rights reserved.</div>
        <div id="stickyFooterWrapper" class="sticky-footer-wrapper" style="display:none;"></div>
    </div>

    <div id="comp-auth-modal"></div>
    <div id="comp-video-player"></div>
    <div id="comp-push-modal"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/component-loader.js"></script>
    
    <script>
        // Load partials
        Promise.all([
            loadComponent('comp-navbar', '/components/home/navbar.html'),
            loadComponent('comp-gallery', '/components/home/gallery.html'),
            loadComponent('comp-call-report', '/components/home/call-report.html'),
            loadComponent('comp-courses', '/components/home/courses.html'),
            loadComponent('comp-auth-modal', '/components/home/auth-modal.html'),
            loadComponent('comp-video-player', '/components/shared/video-player.html'),
            loadComponent('comp-push-modal', '/components/shared/push-modal.html')
        ]).then(() => {
            // Load the giant chunk of JS logic extracted from home.html into a separate file
            let s = document.createElement('script');
            s.src = '/js/home.js'; 
            document.body.appendChild(s);
        });
    </script>
</body>
</html>
