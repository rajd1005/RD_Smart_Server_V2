<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Algo - Trading Masterclass</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="/logo.png">

    <link rel="stylesheet" href="/css/home.css">
</head>
<body>

    <div class="app-wrapper">
        <div id="comp-navbar"></div>
        <div id="comp-courses-demo" data-id="demoCoursesContainer"></div>
        <div id="comp-gallery" data-id="galleryWrapper"></div>
        <div id="comp-call-report" data-id="callReportWrapper"></div>
        <div id="comp-courses-other" data-id="otherCoursesContainer"></div>

        <div class="footer">
            &copy; 2026 RD Algo Trading.<br>
            All rights reserved.
        </div>
        
        <div id="stickyFooterWrapper" class="sticky-footer-wrapper" style="display:none;"></div>
    </div>

    <div id="comp-video-player"></div>
    <div id="comp-auth-modal"></div>
    <div id="comp-push-modal"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script src="/js/component-loader.js"></script>
    
    <script>
        // Load all components concurrently
        Promise.all([
            loadComponent('comp-navbar', '/components/home/navbar.html'),
            loadComponent('comp-courses-demo', '/components/home/courses.html'), // Assuming V2 courses.html has demo & other split
            loadComponent('comp-gallery', '/components/home/gallery.html'),
            loadComponent('comp-call-report', '/components/home/call-report.html'),
            loadComponent('comp-auth-modal', '/components/home/auth-modal.html'),
            loadComponent('comp-video-player', '/components/shared/video-player.html'),
            loadComponent('comp-push-modal', '/components/shared/push-modal.html')
        ]).then(() => {
            // ONLY ONCE the HTML elements exist, load and execute home.js
            let s = document.createElement('script');
            s.src = '/js/home.js';
            document.body.appendChild(s);
        });
    </script>
</body>
</html>
