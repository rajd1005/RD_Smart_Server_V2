<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - Rd Algo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/dashboard.css"> </head>
<body>

    <div class="app-wrapper">
        <div id="comp-header"></div>
        <div id="comp-trades-tab"></div>
        <div id="comp-learning-tab"></div>
        <div id="comp-push-tab"></div>
        <div id="comp-bottom-nav"></div>
    </div>

    <div id="comp-admin-modal"></div>
    <div id="comp-video-player"></div>
    <div id="comp-shared-modals"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/component-loader.js"></script>
    
    <script>
        // Load all components concurrently
        Promise.all([
            loadComponent('comp-header', '/components/dashboard/header.html'),
            loadComponent('comp-trades-tab', '/components/dashboard/trades-tab.html'),
            loadComponent('comp-learning-tab', '/components/dashboard/learning-tab.html'),
            loadComponent('comp-push-tab', '/components/dashboard/push-tab.html'),
            loadComponent('comp-bottom-nav', '/components/dashboard/bottom-nav.html'),
            loadComponent('comp-admin-modal', '/components/dashboard/admin-modal.html'),
            loadComponent('comp-video-player', '/components/shared/video-player.html')
        ]).then(() => {
            // Once HTML is loaded in the DOM, load the functional scripts
            const scripts = [
                '/js/api.config.js', '/js/auth.js', '/js/trades.js', 
                '/js/courses.js', '/js/admin.js', '/js/notifications.js'
            ];
            scripts.forEach(src => {
                let s = document.createElement('script');
                s.src = src;
                document.body.appendChild(s);
            });
        });
    </script>
</body>
</html>
