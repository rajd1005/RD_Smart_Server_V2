<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INT Forex & Crypto - Rd Algo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #f0f2f5; --card-bg: #ffffff;
            --text-primary: #212529; --text-secondary: #878a8d;
            --border-color: #e9ecef;
            --green: #00b346; --red: #ff3b30; --blue: #007aff;
        }
        body { background-color: var(--bg-color); font-family: 'Roboto', sans-serif; color: var(--text-primary); padding-bottom: 60px; font-size: 13px; -webkit-font-smoothing: antialiased; }
        
        .app-header { background: #fff; border-bottom: 1px solid var(--border-color); padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .app-title { font-size: 16px; font-weight: 700; color: #000; letter-spacing: -0.5px; }
        .server-time { font-size: 11px; color: var(--text-secondary); font-family: monospace; }

        .stats-bar { background: #fff; padding: 10px 15px; display: flex; gap: 15px; overflow-x: auto; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; }
        .stats-bar::-webkit-scrollbar { display: none; }
        .stat-item { min-width: 80px; display: flex; flex-direction: column; }
        .stat-lbl { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; font-weight: 500; }
        .stat-val { font-size: 15px; font-weight: 700; color: #000; line-height: 1.1; }
        .val-green { color: var(--green); }
        .val-red { color: var(--red); }

        .trade-list { padding: 0 10px; }
        .trade-card { background: #fff; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); position: relative; }
        .tc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .tc-mid { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .tc-bot { display: flex; justify-content: space-between; background: #f8f9fa; padding: 6px 8px; border-radius: 4px; font-size: 11px; }
        .tc-symbol { font-size: 15px; font-weight: 700; color: #000; }
        .tc-profit { font-size: 16px; font-weight: 700; text-align: right; }
        .tc-time { font-size: 10px; color: var(--text-secondary); }
        .c-green { color: var(--green); } .c-red { color: var(--red); }
        .type-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; }
        .bg-buy { background: #e3f2fd; color: var(--blue); } .bg-sell { background: #ffebee; color: var(--red); }
        .status-txt { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-grp { display: flex; gap: 10px; }
        .dt-item { display: flex; flex-direction: column; }
        .dt-lbl { font-size: 9px; color: var(--text-secondary); margin-bottom: 1px; }
        .dt-val { font-weight: 600; color: #333; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid var(--border-color); padding: 8px 0; display: flex; justify-content: space-around; z-index: 999; }
        .b-btn { background: none; border: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-secondary); font-weight: 500; }
        .b-btn .material-icons-round { font-size: 22px; margin-bottom: 2px; }
        .b-active { color: var(--blue); } .b-del { color: var(--red); }
        
        .offcanvas-bottom { height: auto !important; border-radius: 15px 15px 0 0; }
        .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 2px; }
        .form-control, .form-select { font-size: 13px; padding: 8px; }
        .custom-check { width: 18px; height: 18px; margin-right: 10px; border-radius: 4px; border: 2px solid #ccc; }
        .custom-check:checked { background-color: var(--blue); border-color: var(--blue); }
        
        #noData { padding: 50px; text-align: center; color: var(--text-secondary); }

        #learningSection { display: block; padding: 10px; }
        #tradeSection { display: none; }
        
        /* PARENT MODULE ACCORDION */
        .accordion-item { border: 1px solid var(--border-color); border-radius: 8px !important; margin-bottom: 10px; background: #fff; overflow: hidden; }
        .accordion-button { padding: 12px 15px; font-weight: 700; color: #000; background: #f8f9fa; box-shadow: none !important; display: flex; align-items: center; }
        .accordion-button:not(.collapsed) { background: #e3f2fd; color: var(--blue); }
        
        .module-level-badge { font-size: 10px; font-weight: 600; padding: 3px 6px; border-radius: 4px; color: #fff; margin-left: 10px; }
        .badge-locked { background-color: var(--text-secondary); }
        .badge-unlocked { background-color: var(--green); }
        
        /* NESTED LESSON ACCORDION */
        .lesson-accordion-item { border: none !important; border-top: 1px solid var(--border-color) !important; border-radius: 0 !important; margin: 0 !important; }
        .lesson-accordion-item:first-child { border-top: none !important; }
        .lesson-accordion-btn { padding: 12px 15px; font-size: 13px; font-weight: 600; background: transparent !important; color: inherit; box-shadow: none !important; }
        .lesson-accordion-btn:not(.collapsed) { background: #f8f9fa !important; color: var(--blue) !important; }
        .lesson-accordion-btn::after { transform: scale(0.8); }
        
        .lesson-item-content { padding: 10px; border-radius: 6px; transition: background 0.2s; cursor: pointer; border: 1px solid transparent; }
        .lesson-item-content:hover { background-color: #f1f8ff; border-color: #e3f2fd; }
        
        /* THUMBNAILS */
        .thumb-wrapper { position: relative; width: 80px; height: 45px; flex-shrink: 0; margin-right: 15px; border-radius: 4px; overflow: hidden; background: #000; border: 1px solid rgba(0,0,0,0.1); }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.75; transition: opacity 0.2s; }
        .lesson-item-content:hover .thumb-wrapper img { opacity: 0.95; }
        .thumb-play-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .thumb-play-overlay .material-icons-round { color: #fff; font-size: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); transition: transform 0.2s; }
        .lesson-item-content:hover .thumb-play-overlay .material-icons-round { transform: scale(1.1); }
        
        .lock-notice { background-color: #fff3cd; color: #856404; padding: 10px 15px; font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border-color); }
        .lock-notice a { color: #0056b3; text-decoration: underline; }

        /* VIDEO PLAYER */
        #videoPlayerContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; }
        .video-js { width: 100% !important; height: 100% !important; }
        .close-video { position: absolute; top: 15px; right: 15px; z-index: 2010; color: #fff; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
        
        #dynamicWatermark {
            position: absolute; color: rgba(255, 0, 0, 0.85); font-family: 'Roboto', sans-serif;
            font-size: clamp(11px, 3.5vmin, 24px); font-weight: 900; text-align: center;
            line-height: 1.3; pointer-events: none; z-index: 2005; white-space: nowrap; display: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9), -1px -1px 3px rgba(255,255,255,0.4); 
            transition: top 3s ease-in-out, left 3s ease-in-out; 
        }

        .admin-edit-btn { color: var(--blue); background: none; border: none; font-size: 14px; padding: 5px; }
        .admin-del-btn { color: var(--red); background: none; border: none; font-size: 14px; padding: 5px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="d-flex align-items-center">
            <div class="app-title">INT Forex & Crypto</div>
            <div id="activeDateDisplay" style="font-size: 10px; background: #e3f2fd; color: var(--blue); padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: 600;">Today</div>
        </div>
        <div class="d-flex align-items-center">
            <div class="server-time" id="clock" style="margin-right: 15px;">00:00:00</div>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); padding:0; display:flex; align-items:center;">
                <span class="material-icons-round">logout</span>
            </button>
        </div>
    </header>

    <div id="tradeSection">
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-lbl">Points</span><span class="stat-val" id="totalPips">0.00</span></div>
            <div class="stat-item"><span class="stat-lbl">Active</span><span class="stat-val" id="activeTrades">0</span></div>
            <div class="stat-item"><span class="stat-lbl">Win Rate</span><span class="stat-val" id="winRate">0%</span></div>
            <div class="stat-item"><span class="stat-lbl">Signals</span><span class="stat-val" id="totalTrades">0</span></div>
        </div>
        <div class="trade-list" id="tradeListContainer"></div>
        <div id="noData" style="display:none;"><span class="material-icons-round" style="font-size:32px; opacity:0.3;">toc</span><div class="mt-2 text-muted small">No trades found</div></div>
    </div>

    <div id="learningSection">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div id="adminAccordionControls" style="display:none;">
                <button class="btn btn-sm btn-outline-secondary" onclick="toggleAccordions('all')">Open All</button>
                <button class="btn btn-sm btn-outline-secondary ms-1" onclick="toggleAccordions('none')">Close All</button>
                <button class="btn btn-sm btn-outline-primary ms-1" onclick="toggleAccordions('first')">Open 1st</button>
            </div>
            <button id="btnAdminCourseManager" class="btn btn-sm btn-dark fw-bold ms-auto" style="display:none;" data-bs-toggle="modal" data-bs-target="#adminCourseModal">⚙️ Admin Manager</button>
        </div>
        
        <div class="accordion" id="courseModuleContainer">
            <div class="p-4 text-center text-muted">Loading courses...</div>
        </div>
    </div>

    <div id="videoPlayerContainer">
        <button class="close-video" onclick="closeVideoPlayer()"><span class="material-icons-round">close</span></button>
        <div id="dynamicWatermark"></div>
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback"></video>
    </div>

    <div class="modal fade" id="adminCourseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Admin Course Manager</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="font-size: 13px;">
                    <h6 class="fw-bold text-primary border-bottom pb-2">1. Add New Category/Module</h6>
                    <form id="formAddModule" class="mb-4">
                        <div class="mb-2"><input type="text" id="modTitle" class="form-control" placeholder="Module Title (e.g. Level 5)" required></div>
                        <div class="mb-2"><input type="text" id="modDesc" class="form-control" placeholder="Short Description"></div>
                        <div class="mb-2">
                            <select id="modLevel" class="form-select" required>
                                <option value="demo">Demo / Public (No Login Required)</option>
                                <option value="level_1_status">Level 1 (All Access)</option>
                                <option value="level_2_status">Requires Level 2 Access</option>
                                <option value="level_3_status">Requires Level 3 Access</option>
                                <option value="level_4_status">Requires Level 4 Access</option>
                            </select>
                        </div>
                        <div class="mb-2"><input type="number" id="modDisplayOrder" class="form-control" placeholder="Display Order (e.g. 1, 2, 3)" value="0" required></div>
                        <div class="mb-3"><label class="form-label text-muted small">Custom Lock Notice (HTML/Links allowed)</label><input type="text" id="modLockNotice" class="form-control" placeholder='⚠️ Locked. &lt;a href="https://rdalgo.in" target="_blank"&gt;Upgrade Here&lt;/a&gt;'></div>
                        <button type="submit" class="btn btn-sm btn-primary w-100">Create Module</button>
                    </form>

                    <h6 class="fw-bold text-primary border-bottom pb-2">2. Add New Video Lesson</h6>
                    <form id="formAddLesson" class="mb-4">
                        <div class="mb-2"><select id="lessonModuleId" class="form-select" required><option value="">Select a Module first...</option></select></div>
                        <div class="mb-2"><input type="text" id="lessonTitle" class="form-control" placeholder="Video Title" required></div>
                        <div class="mb-2"><input type="text" id="lessonDesc" class="form-control" placeholder="Video Description"></div>
                        <div class="mb-2"><input type="number" id="lessonDisplayOrder" class="form-control" placeholder="Display Order (e.g. 1, 2, 3)" value="0" required></div>
                        
                        <div class="mb-2">
                            <label class="text-muted small fw-bold">Upload Thumbnail Image</label>
                            <input type="file" id="lessonThumbnailFile" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="text-muted small fw-bold">Upload MP4 Video</label>
                            <input type="file" id="lessonVideoFile" class="form-control" accept="video/mp4,video/x-m4v,video/*" required>
                        </div>
                        <button type="submit" class="btn btn-sm btn-success w-100">Upload Video File</button>
                    </form>

                    <h6 class="fw-bold text-primary border-bottom pb-2">3. Global View Settings</h6>
                    <form id="formAdminSettings">
                        <div class="mb-2">
                            <label class="form-label text-muted small">Default Accordion State (For All Users)</label>
                            <select id="adminAccordionState" class="form-select" required>
                                <option value="first">Open 1st Module & 1st Video</option>
                                <option value="all">Open All Modules & Videos</option>
                                <option value="none">Close All</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-sm btn-warning w-100 fw-bold">Save Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModuleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Category/Module</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="font-size: 13px;">
                    <form id="formEditModule">
                        <input type="hidden" id="editModId">
                        <div class="mb-2"><label class="form-label text-muted small">Module Title</label><input type="text" id="editModTitle" class="form-control" required></div>
                        <div class="mb-2"><label class="form-label text-muted small">Description</label><input type="text" id="editModDesc" class="form-control"></div>
                        <div class="mb-2">
                            <label class="form-label text-muted small">Required Access Level</label>
                            <select id="editModLevel" class="form-select" required>
                                <option value="demo">Demo / Public (No Login Required)</option>
                                <option value="level_1_status">Level 1 (All Access)</option>
                                <option value="level_2_status">Requires Level 2 Access</option>
                                <option value="level_3_status">Requires Level 3 Access</option>
                                <option value="level_4_status">Requires Level 4 Access</option>
                            </select>
                        </div>
                        <div class="mb-2"><label class="form-label text-muted small">Display Order (Placement)</label><input type="number" id="editModDisplayOrder" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label text-muted small">Custom Lock Notice (HTML/Links allowed)</label><input type="text" id="editModLockNotice" class="form-control"></div>
                        <button type="submit" class="btn btn-sm btn-primary w-100">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editLessonModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit Video Information</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="font-size: 13px;">
                    <form id="formEditLesson">
                        <input type="hidden" id="editLessonId">
                        <div class="mb-2"><label class="form-label text-muted small">Video Title</label><input type="text" id="editLessonTitle" class="form-control" required></div>
                        <div class="mb-2"><label class="form-label text-muted small">Description</label><input type="text" id="editLessonDesc" class="form-control"></div>
                        <div class="mb-3"><label class="form-label text-muted small">Display Order (Placement)</label><input type="number" id="editLessonDisplayOrder" class="form-control" required></div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Update Thumbnail Image (Leave empty to keep existing)</label>
                            <input type="file" id="editLessonThumbnailFile" class="form-control" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary w-100">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" id="navDefault">
        <button class="b-btn" id="navTradeBtn" onclick="switchSection('trade')"><span class="material-icons-round">analytics</span>Trade</button>
        <button class="b-btn b-active" id="navLearnBtn" onclick="switchSection('learning')"><span class="material-icons-round">school</span>Learn</button>
        <button class="b-btn" id="btnRefresh" onclick="fetchTrades()" style="display:none;"><span class="material-icons-round">refresh</span>Refresh</button>
        <button class="b-btn" id="btnFilter" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterSheet" style="display:none;"><span class="material-icons-round">filter_list</span>Filter</button>
        <button class="b-btn" id="btnSelect" onclick="toggleSelectionMode()" style="display:none;"><span class="material-icons-round" id="selectIcon">check_circle</span>Select</button>
        <button class="b-btn b-del" id="btnDelete" onclick="deleteSelected()" style="display:none;"><span class="material-icons-round">delete</span>Delete</button>
    </nav>

    <nav class="bottom-nav" id="navSelection" style="display:none;">
        <button class="b-btn" onclick="toggleSelectionMode()"><span class="material-icons-round">close</span>Cancel</button>
        <button class="b-btn b-active" onclick="selectAllTrades()"><span class="material-icons-round">done_all</span>Select All</button>
        <button class="b-btn b-del" onclick="deleteSelected()"><span class="material-icons-round">delete_forever</span>Delete</button>
    </nav>

    <div class="offcanvas offcanvas-bottom" tabindex="-1" id="filterSheet">
        <div class="offcanvas-header pb-0"><h6 class="offcanvas-title fw-bold">Filter Options</h6><button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body pt-2">
        <div class="row g-2">
                <div class="col-12"><label class="form-label">DATE / RANGE</label><input type="text" id="filterDateRange" class="form-control" placeholder="Select Date(s)..." style="background-color: #fff;"></div>
                <div class="col-6"><label class="form-label">TYPE</label><select id="filterType" class="form-select"><option value="ALL">All</option><option value="BUY">Buy</option><option value="SELL">Sell</option></select></div>
                <div class="col-6"><label class="form-label">STATUS</label><select id="filterStatus" class="form-select"><option value="ALL">All</option><option value="OPEN">Running</option><option value="TP">Profitable</option><option value="SL">Loss</option></select></div>
                <div class="col-12"><label class="form-label">SYMBOL</label><select id="filterSymbol" class="form-select"><option value="">All Symbols</option></select></div>
            </div>
            <button class="btn btn-primary w-100 mt-3 fw-bold" data-bs-dismiss="offcanvas" onclick="applyFilters()">Apply</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="app.js"></script>
    <script>setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);</script>
</body>
</html>
